---
deployment:
  tasks:
    # Resolve paths at deploy time instead of hard-coding a username.
    # cPanel runs these tasks AS the cPanel user, FROM the repository checkout,
    # so $HOME and $PWD are reliable; a hard-coded /home/<user>/... path breaks
    # if the account name ever differs.
    - export DEPLOYPATH="$HOME/public_html/olympics.sportsbya.com"
    - export SRC="$PWD"
    - /bin/mkdir -p "$DEPLOYPATH"

    # Private deploy marker (NOT under public/, so it is never web-accessible).
    - 'date > "$DEPLOYPATH/.last_deploy.txt"'
    - 'echo "USER=$(whoami) HOME=$HOME PWD=$PWD" >> "$DEPLOYPATH/.last_deploy.txt"'
    - 'echo "SRC_has_index=$(test -f "$SRC/public/index.php" && echo yes || echo no)" >> "$DEPLOYPATH/.last_deploy.txt"'

    # Sync the repo into the deploy path. rsync preferred; cp fallback.
    - rsync -a --delete --exclude='.git' --exclude='.cpanel.yml' --exclude='.last_deploy.txt' --exclude='.deploy.log' --exclude='config/config.local.php' --exclude='logs/' --exclude='uploads/' --exclude='vendor/' "$SRC/" "$DEPLOYPATH/" >> "$DEPLOYPATH/.deploy.log" 2>&1 || cp -a "$SRC/." "$DEPLOYPATH/" >> "$DEPLOYPATH/.deploy.log" 2>&1
    - 'echo "sync_done rc=$?" >> "$DEPLOYPATH/.last_deploy.txt"'

    # Writable runtime dirs.
    - /bin/mkdir -p "$DEPLOYPATH/logs" "$DEPLOYPATH/uploads" "$DEPLOYPATH/uploads/participants"
