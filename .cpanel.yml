---
deployment:
  tasks:
    - export DEPLOYPATH=/home/shooting/public_html/olympics.sportsbya.com
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/date > "$DEPLOYPATH/.last_deploy.txt"
    - /usr/bin/rsync -a --delete --exclude='.git' --exclude='.cpanel.yml' --exclude='.last_deploy.txt' --exclude='config/config.local.php' --exclude='logs/' --exclude='uploads/' --exclude='vendor/' "$PWD/" "$DEPLOYPATH/"
    - /bin/mkdir -p "$DEPLOYPATH/logs" "$DEPLOYPATH/uploads" "$DEPLOYPATH/uploads/participants"
    - /bin/chmod -R 755 "$DEPLOYPATH/logs" "$DEPLOYPATH/uploads"
